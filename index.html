<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC LEMON 3D</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="14" fill="%23f5c000"/%3E%3Ccircle cx="32" cy="32" r="21" fill="%23fff26a" stroke="%230b1720" stroke-width="4"/%3E%3Ccircle cx="32" cy="32" r="13" fill="%23ffe052" opacity=".85"/%3E%3Cpath d="M32 13v38M13 32h38M18.6 18.6l26.8 26.8M45.4 18.6 18.6 45.4" stroke="%23fff9c7" stroke-width="4" stroke-linecap="round"/%3E%3Ccircle cx="32" cy="32" r="4" fill="%23ffffff"/%3E%3C/svg%3E' />
  <style>
    :root {
      --yellow: #f5c000;
      --blue: #0015ff;
      --red: #ff0000;
      --accent: #0ae2ff;
      --ink: #0b1720;
    }
    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--yellow);
      font-family: "Noto Sans JP", "Hiragino Sans", system-ui, sans-serif;
      color: var(--ink);
    }
    #scene {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #start-screen {
      background:
        radial-gradient(circle at 24% 24%, rgba(255,255,255,0.2), transparent 26%),
        radial-gradient(circle at 78% 30%, rgba(10,226,255,0.18), transparent 28%),
        rgba(0,0,0,0.48) !important;
      backdrop-filter: blur(2px);
    }
    #start-screen > div {
      background: linear-gradient(145deg, rgba(255,251,210,0.96), rgba(255,234,85,0.94)) !important;
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow:
        0 20px 52px rgba(0,0,0,0.38),
        0 0 0 6px rgba(255,210,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.8) !important;
    }
    #start-screen button {
      box-shadow: 0 8px 0 rgba(0,0,0,0.18), 0 14px 24px rgba(0,0,0,0.18);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }
    #start-screen button:hover {
      transform: translateY(-2px);
      filter: saturate(1.1) brightness(1.05);
      box-shadow: 0 10px 0 rgba(0,0,0,0.16), 0 18px 28px rgba(0,0,0,0.22);
    }
    #hud {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: 1fr auto auto;
      align-items: center;
      justify-items: center;
      pointer-events: none;
      padding: 12px;
    }
    #call {
      font-size: clamp(48px, 10vw, 120px);
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #fff;
      text-shadow: 0 6px 20px rgba(0,0,0,0.25);
      opacity: 0.94;
    }
    #status {
      font-size: 1.1rem;
      font-weight: 700;
      color: rgba(0,0,0,0.7);
      background: rgba(255,255,255,0.72);
      border-radius: 12px;
      padding: 6px 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }
    #bar {
      display: flex;
      gap: 12px;
      background: rgba(255,255,255,0.72);
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }
    #controls-guide {
      position: fixed;
      inset: 14px 16px auto;
      z-index: 7;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    .control-card {
      width: min(280px, 42vw);
      background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(255,243,126,0.78));
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(11,23,32,0.08);
      backdrop-filter: blur(5px);
    }
    .control-card.right {
      text-align: right;
    }
    .control-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 1.05rem;
      font-weight: 900;
      margin-bottom: 8px;
      color: #0b1720;
    }
    .control-card.right .control-title {
      justify-content: flex-end;
    }
    .control-sub {
      font-size: 0.78rem;
      font-weight: 800;
      color: rgba(11,23,32,0.62);
    }
    .control-list {
      display: grid;
      gap: 6px;
      font-size: clamp(0.78rem, 1.4vw, 0.95rem);
      font-weight: 800;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
    }
    .control-card.right .control-row {
      justify-content: flex-end;
    }
    .control-key {
      min-width: 32px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border: 2px solid #0b1720;
      border-radius: 6px;
      background: linear-gradient(180deg, #ffffff, #d8f7ff);
      font-weight: 900;
      color: #0b1720;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.12), 0 2px 0 rgba(0,0,0,0.12);
    }
    .control-action {
      color: rgba(11,23,32,0.9);
    }
    .control-card.is-cpu .control-row {
      opacity: 0.45;
    }
    .control-card.is-cpu .control-sub::after {
      content: " / CPU自動操作";
    }
    @media (max-width: 720px) {
      #controls-guide {
        inset: 8px 8px auto;
        gap: 8px;
      }
      .control-card {
        width: calc(50vw - 12px);
        padding: 8px;
      }
      .control-title {
        font-size: 0.92rem;
        margin-bottom: 6px;
      }
      .control-list {
        gap: 4px;
      }
      .control-row {
        gap: 5px;
      }
      .control-key {
        min-width: 26px;
        height: 24px;
        font-size: 0.78rem;
      }
    }
    .flash { animation: pulse 0.8s ease-in-out infinite; }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 0.5; }
    }
    .pill {
      border: 2px solid #0b1720;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      background: #fff;
      color: #0b1720;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, color 0.12s ease;
    }
    .pill.active {
      background: #0b1720;
      color: #fff9d8;
      box-shadow: 0 10px 24px rgba(0,0,0,0.26);
      transform: translateY(-1px);
    }
    #cpu-difficulty .pill {
      position: relative;
      min-width: 78px;
      padding-left: 12px !important;
      padding-right: 12px !important;
    }
    #cpu-difficulty .pill.active {
      background: #0b1720 !important;
      color: #fff9d8 !important;
      border-color: #fff25a !important;
      box-shadow:
        0 0 0 3px #fff25a,
        0 8px 0 rgba(0,0,0,0.2),
        0 14px 24px rgba(0,0,0,0.24) !important;
      transform: translateY(-2px) scale(1.04);
    }
    #cpu-difficulty .pill.active::before {
      content: "✓";
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      margin-right: 5px;
      border-radius: 50%;
      background: #fff25a;
      color: #0b1720;
      font-size: 0.78rem;
      font-weight: 900;
      vertical-align: 1px;
    }
    #shield-meters {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }
    .shield-meter {
      position: absolute;
      width: 64px;
      height: 64px;
      transform: translate(-50%, -120%);
      border-radius: 50%;
      background:
        conic-gradient(#7bf0ff calc(var(--pct, 1) * 100%), rgba(0,0,0,0.08) 0);
      box-shadow:
        0 8px 18px rgba(0,0,0,0.35),
        0 4px 10px rgba(123,240,255,0.35);
      display: grid;
      place-items: center;
      opacity: 0.9;
    }
    .shield-meter.locked {
      background: repeating-conic-gradient(from 45deg, rgba(123,240,255,0.4) 0 15deg, rgba(0,0,0,0.08) 15deg 30deg);
      box-shadow:
        0 8px 18px rgba(0,0,0,0.35),
        0 4px 10px rgba(123,240,255,0.35);
      opacity: 0.75;
    }
    .shield-meter .label {
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 1px 2px rgba(0,0,0,0.6),
        0 0 10px rgba(0,0,0,0.35);
      line-height: 1.1;
    }
    .bottle-wrap {
      justify-self: center;
      position: relative;
      width: 82px;
      height: 200px;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
    }
    .bottle {
      position: absolute;
      inset: 0;
      border-radius: 24px 24px 18px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.2));
      border: 2px solid rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .bottle::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 18px 18px 14px 14px;
      background: rgba(255,255,255,0.25);
      z-index: 2;
      pointer-events: none;
    }
    .juice {
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: 4px;
      height: calc(var(--juice, 1) * 100%);
      background: linear-gradient(180deg, #ffd94c, #f9a400);
      border-radius: 14px 14px 12px 12px;
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.45),
        inset 0 -4px 10px rgba(0,0,0,0.15);
      transition: height 0.25s ease, background 0.2s ease;
    }
    .juice.low {
      background: linear-gradient(180deg, #ff9c6c, #f05c1f);
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.45),
        inset 0 -4px 10px rgba(0,0,0,0.25);
    }
    .bottle-label {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-weight: 900;
      font-size: 0.9rem;
      color: #0b1720;
      text-shadow: 0 1px 3px rgba(255,255,255,0.8);
      z-index: 3;
    }
    .red-x {
      position: absolute;
      color: #ff2222;
      font-size: 72px;
      font-weight: 900;
      transform: translate(-50%, -50%);
      text-shadow: 0 0 16px rgba(255,0,0,0.6);
      opacity: 0.9;
    }
    #bottles { display: none; }
    #boost-bar {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 8;
    }
    #shield-meters { }
    .boost-pill {
      position: absolute;
      width: 16px;
      height: 120px;
      transform: translate(-50%, -50%);
      border-radius: 10px;
      background: rgba(0,0,0,0.35);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }
    .boost-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0%;
      background: linear-gradient(180deg, #7bf0ff, #0ae2ff);
      box-shadow: 0 0 12px rgba(10,226,255,0.6);
      transition: height 0.2s ease;
    }
    .boost-pill.ready .boost-fill {
      animation: pulse 1s ease-in-out infinite;
    }
    .call-pop {
      animation: call-pop 0.5s ease-out;
    }
    @keyframes call-pop {
      0% { transform: scale(0.6); opacity: 0; }
      40% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .score-flash {
      animation: score-flash 0.4s ease-out;
    }
    @keyframes score-flash {
      0% { transform: scale(1.2); color: #fff; text-shadow: 0 0 14px rgba(255,255,255,0.9); }
      100% { transform: scale(1); color: inherit; text-shadow: none; }
    }
    #fx-layer {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
      mix-blend-mode: screen;
    }
    .fx-burst {
      position: absolute;
      width: 220px;
      height: 220px;
      transform: translate(-50%, -50%) scale(0.6);
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(250,226,80,0.85) 35%, rgba(255,95,63,0.2) 70%, rgba(255,95,63,0) 90%);
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.6));
      animation: fx-pop 0.48s ease-out forwards;
    }
    .fx-speed {
      position: absolute;
      width: 120vw;
      height: 12px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 25%, rgba(255,255,255,0) 60%);
      opacity: 0.85;
      --rot: 0deg;
      transform-origin: left center;
      animation: fx-speed 0.42s cubic-bezier(0.16, 0.86, 0.4, 1) forwards;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
    }
    .fx-flash {
      position: absolute;
      inset: -10%;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.5), rgba(255,255,255,0));
      animation: fx-flash 0.28s ease-out forwards;
    }
    .fx-impact {
      position: absolute;
      width: 260px;
      height: 200px;
      transform: translate(-50%, -50%) scale(0.46);
      background: #ff9c1f;
      clip-path: polygon(
        50% 0%,
        57% 6%,
        66% 3%,
        72% 10%,
        82% 6%,
        86% 14%,
        94% 12%,
        90% 22%,
        98% 26%,
        90% 34%,
        100% 42%,
        88% 46%,
        96% 54%,
        86% 52%,
        92% 62%,
        82% 60%,
        84% 70%,
        72% 66%,
        70% 82%,
        60% 76%,
        50% 94%,
        40% 76%,
        30% 82%,
        28% 66%,
        16% 70%,
        18% 60%,
        8% 62%,
        14% 52%,
        4% 54%,
        12% 46%,
        0% 42%,
        10% 34%,
        2% 26%,
        10% 22%,
        6% 12%,
        14% 14%,
        18% 6%,
        28% 10%,
        34% 3%,
        43% 6%
      );
      box-shadow: 0 0 16px rgba(255, 156, 31, 0.7);
      animation: fx-impact 0.3s ease-out forwards;
    }
    .fx-result {
      position: absolute;
      transform: translate(-50%, -50%) scale(0.7);
      font-weight: 900;
      font-size: clamp(48px, 8vw, 104px);
      letter-spacing: 0.04em;
      -webkit-text-stroke: 4px #0b1720;
      text-shadow:
        0 10px 0 rgba(0,0,0,0.22),
        0 0 24px rgba(255,255,255,0.75);
      animation: fx-result-pop 0.9s cubic-bezier(0.16, 0.88, 0.25, 1) forwards;
      white-space: nowrap;
    }
    .fx-result.win {
      color: #fff25a;
    }
    .fx-result.out {
      color: #ff5548;
    }
    .fx-vignette {
      position: absolute;
      inset: -8%;
      background: radial-gradient(circle, rgba(255,255,255,0) 35%, rgba(255,61,61,0.22) 66%, rgba(0,0,0,0.42) 100%);
      animation: fx-vignette 0.7s ease-out forwards;
    }
    @keyframes fx-pop {
      0% { transform: translate(-50%, -50%) scale(0.4) rotate(0deg); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(1.1) rotate(20deg); }
      100% { transform: translate(-50%, -50%) scale(1.2) rotate(32deg); opacity: 0; }
    }
    @keyframes fx-speed {
      0% { transform: rotate(var(--rot)) translate(-20%, -50%) scaleX(0.2); opacity: 1; }
      60% { opacity: 1; }
      100% { transform: rotate(var(--rot)) translate(10%, -50%) scaleX(1.1); opacity: 0; }
    }
    @keyframes fx-flash {
      0% { opacity: 0.95; }
      100% { opacity: 0; }
    }
    @keyframes fx-impact {
      0% { transform: translate(-50%, -50%) scale(0.34); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(1.02); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.16); opacity: 0; }
    }
    @keyframes fx-result-pop {
      0% { transform: translate(-50%, -50%) scale(0.45) rotate(-7deg); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.15) rotate(3deg); opacity: 1; }
      70% { transform: translate(-50%, -58%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -72%) scale(0.92) rotate(0deg); opacity: 0; }
    }
    @keyframes fx-vignette {
      0% { opacity: 0; }
      18% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="shield-meters">
    <div class="shield-meter" id="shield-meter-left">
      <div class="label"></div>
    </div>
    <div class="shield-meter" id="shield-meter-right">
      <div class="label"></div>
    </div>
  </div>
  <div id="bottles">
    <div class="bottle-wrap">
      <div class="bottle">
        <div class="juice" id="juice-left"></div>
        <div class="bottle-label">1P</div>
      </div>
    </div>
    <div class="bottle-wrap">
      <div class="bottle">
        <div class="juice" id="juice-right"></div>
        <div class="bottle-label">2P/CPU</div>
      </div>
    </div>
  </div>
  <div id="boost-bar">
    <div class="boost-pill" id="boost-pill-left"><div class="boost-fill" id="boost-fill-left"></div></div>
    <div class="boost-pill" id="boost-pill-right"><div class="boost-fill" id="boost-fill-right"></div></div>
  </div>
  <div id="fx-layer"></div>
  <div id="controls-guide" aria-label="操作ガイド">
    <div class="control-card left">
      <div class="control-title">1P <span class="control-sub">キーボード</span></div>
      <div class="control-list">
        <div class="control-row"><span class="control-key">A</span><span class="control-action">ためる</span></div>
        <div class="control-row"><span class="control-key">S</span><span class="control-action">撃つ</span></div>
        <div class="control-row"><span class="control-key">D</span><span class="control-action">守る</span></div>
      </div>
    </div>
    <div class="control-card right" id="right-control-card">
      <div class="control-title"><span class="control-sub" id="right-control-sub">キーボード</span> <span id="right-control-title">2P</span></div>
      <div class="control-list">
        <div class="control-row"><span class="control-action">ためる</span><span class="control-key">;</span></div>
        <div class="control-row"><span class="control-action">撃つ</span><span class="control-key">:</span></div>
        <div class="control-row"><span class="control-action">守る</span><span class="control-key">]</span></div>
      </div>
    </div>
  </div>
  <div id="lock-x-layer" style="position:fixed;inset:0;pointer-events:none;z-index:8;"></div>
  <div id="start-screen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:5;">
    <div style="background:#fff8d0;border-radius:16px;padding:18px 22px;box-shadow:0 12px 30px rgba(0,0,0,0.4);display:grid;gap:10px;min-width:260px;text-align:center;font-weight:800;color:#0b1720;position:relative;">
      <div style="font-size:1.2rem;">モード選択</div>
      <button id="btn-1p" style="padding:10px 12px;font-size:1.05rem;border:none;border-radius:10px;background:#1f2fe6;color:#fff;cursor:pointer;">1人プレイ</button>
      <button id="btn-2p" style="padding:10px 12px;font-size:1.05rem;border:none;border-radius:10px;background:#f01f1f;color:#fff;cursor:pointer;">2人プレイ</button>
      <div id="cpu-difficulty" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:0.9rem;">
        <span style="font-weight:700;">CPU:</span>
        <button class="pill" data-cpu="normal" style="padding:6px 10px;border:none;border-radius:10px;background:#fff;color:#0b1720;cursor:pointer;font-weight:800;border:2px solid #0b1720;">ふつう</button>
        <button class="pill" data-cpu="smart" style="padding:6px 10px;border:none;border-radius:10px;background:#fff;color:#0b1720;cursor:pointer;font-weight:800;border:2px solid #0b1720;">あたまいい</button>
        <button class="pill" data-cpu="hard" style="padding:6px 10px;border:none;border-radius:10px;background:#fff;color:#0b1720;cursor:pointer;font-weight:800;border:2px solid #0b1720;">ハード</button>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;align-items:center;font-size:0.9rem;">
        <span style="font-weight:700;">草:</span>
        <button id="btn-grass-toggle" class="pill" type="button" style="padding:6px 14px;border:2px solid #0b1720;border-radius:10px;background:#fff;color:#0b1720;cursor:pointer;font-weight:800;min-width:88px;">OFF</button>
      </div>
      <div style="display:grid;gap:6px;font-size:0.9rem;">
        <div style="font-weight:700;">頭装備</div>
        <div style="display:grid;gap:6px;">
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
            <span style="font-weight:700;">左</span>
            <div style="display:flex;gap:6px;align-items:center;">
              <button class="pill pill-head" data-head-side="left" data-dir="-1" style="padding:6px 10px;border:2px solid #0b1720;border-radius:10px;font-weight:800;background:#fff;">◀</button>

  <script type="module">
    import * as THREE from "three";

    };
    Object.values(sounds).forEach((s) => { s.volume = 0.7; });
    let audioCtx = null;
    function getAudioCtx() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      if (!audioCtx) audioCtx = new Ctx();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }
    function playClap() {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      const noiseSize = Math.floor(ctx.sampleRate * 0.08);
      const buffer = ctx.createBuffer(1, noiseSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < noiseSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / noiseSize);
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(1700, now);
      filter.Q.setValueAtTime(0.9, now);
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(0.65, now + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
      src.connect(filter).connect(gain).connect(ctx.destination);
      src.start(now);
      src.stop(now + 0.1);
    }
    function playDon() {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(130, now);
      osc.frequency.exponentialRampToValueAtTime(48, now + 0.18);
      gain.gain.setValueAtTime(0.7, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.24);
    }
    function playCheer() {
      const ctx = getAudioCtx();
      if (!ctx) return;
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "triangle";
          osc.frequency.setValueAtTime(360 + Math.random() * 420, now);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
          osc.connect(gain).connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.3);
        }, i * 55);
      }
    }

    // Basic THREE setup
    const canvas = document.getElementById("scene");

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });

    const worldUniforms = {

    function getGpuRendererName() {
      try {
        const gl = renderer.getContext();
        const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
        if (!debugInfo) return "";
        return String(gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || "");
      } catch (e) {
        return "";

    }

    function getPerformanceScore() {
      if (isMobile) return false;
      const cores = navigator.hardwareConcurrency || 0;
      const memory = navigator.deviceMemory || 0;
      const maxTextureSize = renderer.capabilities.maxTextureSize || 0;
      const gpu = getGpuRendererName().toLowerCase();
      const strongGpu = /(rtx|geforce|radeon pro|radeon rx|apple m[1-9]|m[1-9] pro|m[1-9] max|m[1-9] ultra)/.test(gpu);
      const weakGpu = /(intel|uhd|iris|swiftshader|llvmpipe)/.test(gpu);
      let score = 0;
      if (cores >= 8) score += 2;
      else if (cores >= 6) score += 1;
      if (memory >= 8) score += 2;
      else if (memory >= 4) score += 1;
      if (maxTextureSize >= 16384) score += 2;
      else if (maxTextureSize >= 8192) score += 1;
      if (strongGpu) score += 2;
      if (weakGpu) score -= 2;
      return score;
    }

    function shouldAutoEnableGrass() {
      if (isMobile) return false;
      const score = getPerformanceScore();
      return score >= 5;
    }

    function shouldAnimateGrass() {
      if (isMobile) return false;
      const score = getPerformanceScore();
      return score >= 7;
    }

    function makeBackdropMaterial() {
      return new THREE.ShaderMaterial({
        uniforms: worldUniforms,
        depthWrite: false,
        depthTest: false,
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float time;
          uniform float pulse;
          varying vec2 vUv;
          void main() {
            float vertical = smoothstep(0.0, 1.0, vUv.y);
            float soft = sin(vUv.x * 3.14159 + time * 0.06) * 0.5 + 0.5;
            vec3 base = mix(vec3(0.82, 0.60, 0.08), vec3(0.96, 0.80, 0.22), vertical);
            base += vec3(1.0, 0.95, 0.55) * soft * 0.025;
            base += vec3(1.0, 0.45, 0.12) * pulse * 0.04;
            gl_FragColor = vec4(base, 1.0);
          }
        `,
      });
    }

    const backdrop = new THREE.Mesh(

    function makeLemonSlice(radius = 0.75) {

        spoke.rotation.z = (i / 8) * Math.PI * 2;

      return group;

    function makeBigLemon() {

    let crateFaceTexture = null;
    function makeCrateFaceTexture() {
      if (crateFaceTexture) return crateFaceTexture;
      const size = 256;
      const c = document.createElement("canvas");
      c.width = c.height = size;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#f2df9c";
      ctx.fillRect(0, 0, size, size);
      for (let y = 26; y < size; y += 38) {
        ctx.fillStyle = y % 76 === 26 ? "rgba(126,92,18,0.34)" : "rgba(255,255,255,0.28)";
        ctx.fillRect(0, y, size, 5);
        ctx.fillStyle = "rgba(126,92,18,0.12)";
        ctx.fillRect(0, y + 10, size, 2);
      }
      for (let i = 0; i < 18; i++) {
        const y = 10 + i * 14;
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.bezierCurveTo(60, y - 5, 150, y + 5, size, y);
        ctx.stroke();
      }
      crateFaceTexture = new THREE.CanvasTexture(c);
      crateFaceTexture.colorSpace = THREE.SRGBColorSpace;
      return crateFaceTexture;
    }

    function makeWoodCrate() {
      const group = new THREE.Group();
      const baseWood = new THREE.MeshStandardMaterial({
        color: 0xf5e7ad,
        map: makeCrateFaceTexture(),
        emissive: 0x8c6a18,
        emissiveIntensity: 0.06,
        roughness: 0.5,
        metalness: 0.02,
      });
      const edgeWood = envMat(0xd6b94d, 0x6b4e08, 0.08);
      const box = new THREE.Mesh(new THREE.BoxGeometry(1.16, 1.16, 1.16), baseWood);
      group.add(box);

      const addBox = (x, y, z, sx, sy, sz, rx = 0, ry = 0, rz = 0, mat = edgeWood) => {
        const slat = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), mat);
        slat.position.set(x, y, z);
        slat.rotation.set(rx, ry, rz);
        group.add(slat);
      };

      const e = 0.63;
      const beam = 0.16;
      addBox(0, e, e, 1.42, beam, beam);
      addBox(0, -e, e, 1.42, beam, beam);
      addBox(0, e, -e, 1.42, beam, beam);
      addBox(0, -e, -e, 1.42, beam, beam);
      addBox(e, 0, e, beam, 1.42, beam);
      addBox(-e, 0, e, beam, 1.42, beam);
      addBox(e, 0, -e, beam, 1.42, beam);
      addBox(-e, 0, -e, beam, 1.42, beam);
      addBox(e, e, 0, beam, beam, 1.42);
      addBox(-e, e, 0, beam, beam, 1.42);
      addBox(e, -e, 0, beam, beam, 1.42);
      addBox(-e, -e, 0, beam, beam, 1.42);
      return group;
    }

    const cratePatterns = {
      lowWide: [[-1.05, 0, 0, 0.04, 1.05], [0.12, 0.02, 0.06, -0.08, 0.95], [1.18, -0.02, -0.04, 0.11, 1.0]],
      tower: [[0, 0, 0, 0.02, 1.0], [0.08, 1.25, -0.05, -0.12, 0.92], [-0.06, 2.37, 0.04, 0.08, 0.82]],
      stairLeft: [[-1.05, 0, 0, 0.12, 1.0], [0.05, 0.08, -0.03, -0.04, 0.96], [0.66, 1.2, 0.05, 0.2, 0.86]],
      stairRight: [[1.05, 0, 0, -0.12, 1.0], [-0.05, 0.08, -0.03, 0.04, 0.96], [-0.66, 1.2, 0.05, -0.2, 0.86]],
      messy: [[-0.76, 0, 0.04, -0.18, 0.9], [0.72, 0.1, -0.08, 0.16, 1.02], [0.02, 1.2, 0.02, -0.03, 0.88], [0.92, 0.98, 0.58, 0.2, 0.72]],
      frontCluster: [[-0.72, 0, -0.08, 0.08, 1.0], [0.68, 0, -0.12, -0.12, 0.94], [0.06, 0.06, 0.92, 0.18, 0.88], [0, 1.28, -0.02, -0.04, 0.82]],

    function makeCrateStack(patternName = "lowWide", side = -1, scale = 1.2) {
      const stack = new THREE.Group();
      const placements = cratePatterns[patternName] || cratePatterns.lowWide;
      placements.forEach(([x, y, z, rot, crateScale]) => {
        const crate = makeWoodCrate();
        crate.position.set(x, y, z);
        crate.rotation.y = side < 0 ? 0.2 + rot : -0.2 + rot;
        crate.rotation.z = rot * 0.18;
        crate.scale.setScalar(crateScale);
        stack.add(crate);
      });
      stack.scale.setScalar(scale);
      return stack;
    }

    function makeGrassTuft(seed = 0) {
      const group = new THREE.Group();
      const bladeMatA = new THREE.MeshToonMaterial({ color: 0xf6d54b, gradientMap: null, emissive: 0x6c4f00, emissiveIntensity: 0.08 });
      const bladeMatB = new THREE.MeshToonMaterial({ color: 0xd9b83a, gradientMap: null, emissive: 0x4a3600, emissiveIntensity: 0.06 });
      const bladeCount = 3 + (seed % 2);
      for (let i = 0; i < bladeCount; i++) {
        const shape = new THREE.Shape();
        const width = 0.045 + ((seed + i) % 4) * 0.009;
        const height = 0.34 + ((seed * 7 + i * 5) % 8) * 0.025;
        shape.moveTo(-width, 0);
        shape.lineTo(0, height);
        shape.lineTo(width, 0);
        shape.closePath();
        const blade = new THREE.Mesh(
          new THREE.ShapeGeometry(shape),
          i % 2 ? bladeMatA : bladeMatB
        );
        blade.position.x = (i - (bladeCount - 1) / 2) * 0.055;
        blade.rotation.y = ((seed + i) % 7 - 3) * 0.18;
        blade.rotation.z = ((seed * 3 + i) % 5 - 2) * 0.08;
        blade.rotation.x = -Math.PI / 2 + ((seed + i) % 5 - 2) * 0.05;
        blade.renderOrder = -2;
        group.add(blade);
      }
      return group;
    }

    function makeGrassBladeGeometry() {
      const shape = new THREE.Shape();
      shape.moveTo(-0.135, 0);
      shape.lineTo(0, 1.14);
      shape.lineTo(0.135, 0);
      shape.closePath();
      return new THREE.ShapeGeometry(shape);
    }

    function makeGrassMaterial(rootColor, tipColor) {
      return new THREE.ShaderMaterial({
        uniforms: {
          rootColor: { value: new THREE.Color(rootColor) },
          tipColor: { value: new THREE.Color(tipColor) },
          time: worldUniforms.time,
          grassWind: worldUniforms.grassWind,
        },
        vertexShader: `
          uniform float time;
          uniform float grassWind;
          varying float vHeight;
          void main() {
            vHeight = clamp(position.y / 1.14, 0.0, 1.0);
            vec4 worldPos = instanceMatrix * vec4(position, 1.0);
            float sway = sin(time * 1.6 + worldPos.x * 0.65 + worldPos.z * 0.45) * 0.16;
            sway += sin(time * 2.7 + worldPos.x * 0.25) * 0.055;
            worldPos.x += sway * grassWind * vHeight * vHeight;
            worldPos.z += cos(time * 1.25 + worldPos.x * 0.35) * 0.045 * grassWind * vHeight;
            gl_Position = projectionMatrix * modelViewMatrix * worldPos;
          }
        `,
        fragmentShader: `
          uniform vec3 rootColor;
          uniform vec3 tipColor;
          varying float vHeight;
          void main() {
            float t = smoothstep(0.0, 1.0, vHeight);
            vec3 color = mix(rootColor, tipColor, t);
            gl_FragColor = vec4(color, 1.0);
          }
        `,
        side: THREE.DoubleSide,
      });
    }

    let grassThatchTexture = null;
    function makeGrassThatchTexture() {
      if (grassThatchTexture) return grassThatchTexture;
      const size = 512;
      const c = document.createElement("canvas");
      c.width = c.height = size;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#8d5f08";
      ctx.fillRect(0, 0, size, size);
      for (let i = 0; i < 2600; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const len = 8 + Math.random() * 34;
        const hue = Math.random();
        ctx.strokeStyle = hue < 0.45
          ? "rgba(255,214,34,0.38)"
          : hue < 0.78
            ? "rgba(177,116,5,0.42)"

    function addGrassField() {
      if (grassField) return;
      const cols = 112;
      const rows = 28;
      const bladesPerCell = 6;
      const total = cols * rows * bladesPerCell;
      const bladeGeom = makeGrassBladeGeometry();
      const matA = makeGrassMaterial(0xb98f18, 0xfff06a);
      const matB = makeGrassMaterial(0xa97810, 0xf6d54b);
      const grassA = new THREE.InstancedMesh(bladeGeom, matA, Math.ceil(total / 2));
      const grassB = new THREE.InstancedMesh(bladeGeom, matB, Math.floor(total / 2));
      const rootGrass = new THREE.InstancedMesh(bladeGeom, makeGrassMaterial(0x8f6408, 0xd7a515), cols * rows * 3);
      grassA.renderOrder = -2;
      grassB.renderOrder = -2;
      rootGrass.renderOrder = -2.5;
      const dummy = new THREE.Object3D();
      let ai = 0;
      let bi = 0;
      let ri = 0;
      for (let ix = 0; ix < cols; ix++) {
        for (let iz = 0; iz < rows; iz++) {
          const seed = ix * 31 + iz * 17;
          const x = -23.2 + ix * 0.42 + ((seed % 11) - 5) * 0.03;
          const z = -7.5 + iz * 0.54 + (((seed * 3) % 13) - 6) * 0.026;
          for (let b = 0; b < bladesPerCell; b++) {
            const bladeSeed = seed + b * 19;
            dummy.position.set(
              x + (b - 2.5) * 0.055 + ((bladeSeed % 7) - 3) * 0.011,
              -1.98,
              z + (((bladeSeed * 5) % 9) - 4) * 0.018
            );
            dummy.rotation.set(
              ((bladeSeed % 5) - 2) * 0.08,
              (bladeSeed % 31) * 0.2,
              ((bladeSeed % 7) - 3) * 0.12
            );
            const scale = 0.72 + (bladeSeed % 9) * 0.035;
            dummy.scale.set(scale * (0.78 + b * 0.08), scale, scale);
            dummy.updateMatrix();
            if ((bladeSeed + b) % 2 === 0 && ai < grassA.count) grassA.setMatrixAt(ai++, dummy.matrix);
            else if (bi < grassB.count) grassB.setMatrixAt(bi++, dummy.matrix);
          }
          for (let r = 0; r < 3; r++) {
            const rootSeed = seed + r * 23;
            dummy.position.set(
              x + (r - 1) * 0.12 + ((rootSeed % 9) - 4) * 0.018,
              -1.985,
              z + (((rootSeed * 7) % 11) - 5) * 0.024
            );
            dummy.rotation.set(
              ((rootSeed % 5) - 2) * 0.12,
              (rootSeed % 37) * 0.17,
              ((rootSeed % 7) - 3) * 0.18
            );
            const rootScale = 0.28 + (rootSeed % 5) * 0.025;
            dummy.scale.set(rootScale * 1.55, rootScale * 0.72, rootScale);
            dummy.updateMatrix();
            if (ri < rootGrass.count) rootGrass.setMatrixAt(ri++, dummy.matrix);
          }
        }
      }
      grassA.count = ai;
      grassB.count = bi;
      rootGrass.count = ri;
      grassA.instanceMatrix.needsUpdate = true;
      grassB.instanceMatrix.needsUpdate = true;
      rootGrass.instanceMatrix.needsUpdate = true;
      grassField = new THREE.Group();
      grassField.name = "grassField";
      const thatch = new THREE.Mesh(
        new THREE.PlaneGeometry(48, 16.8, 1, 1),
        new THREE.MeshBasicMaterial({
          map: makeGrassThatchTexture(),
          side: THREE.DoubleSide,
          depthWrite: false,
        })
      );
      thatch.rotation.x = -Math.PI / 2;
      thatch.position.set(0, -1.992, 0);
      thatch.renderOrder = -3;
      grassField.add(thatch, rootGrass, grassA, grassB);
      backgroundScene.add(grassField);
    }

    function updateEnvironment(t, delta) {
      worldUniforms.time.value = t;

      environmentItems.forEach((item, i) => {
        item.mesh.rotation.y += item.spin * delta;
        item.mesh.position.y = item.baseY + Math.sin(t * 1.7 + i) * item.bob;
      });
      fizzBubbles.forEach((bubble, i) => {
        const data = bubble.userData;
        bubble.position.y += data.speed * delta;
        bubble.position.x += Math.sin(t * data.drift + data.phase) * delta * 0.16;
        bubble.scale.setScalar(1 + Math.sin(t * 2.4 + i) * 0.18);
        if (bubble.position.y > 4.4) {
          bubble.position.y = -1.8;
          bubble.position.x = (Math.random() - 0.5) * 13;
        }
      });
    }

    function makeCapsuleMaterial(color) {
      const base = new THREE.Color(color);
      const top = base.clone().lerp(new THREE.Color(0xffffff), 0.24);
      const bottom = base.clone().lerp(new THREE.Color(0x05091a), 0.18);
      const rim = base.clone().lerp(new THREE.Color(0xefffff), 0.62);
      return new THREE.ShaderMaterial({
        uniforms: {
          time: worldUniforms.time,
          baseColor: { value: base },
          topColor: { value: top },
          bottomColor: { value: bottom },
          rimColor: { value: rim },
        },
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vWorld;
          varying float vY;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 world = modelMatrix * vec4(position, 1.0);
            vWorld = world.xyz;
            vY = position.y;
            gl_Position = projectionMatrix * viewMatrix * world;
          }
        `,
        fragmentShader: `
          uniform float time;
          uniform vec3 baseColor;
          uniform vec3 topColor;
          uniform vec3 bottomColor;
          uniform vec3 rimColor;
          varying vec3 vNormal;
          varying vec3 vWorld;
          varying float vY;
          void main() {
            vec3 n = normalize(vNormal);
            vec3 viewDir = normalize(cameraPosition - vWorld);
            vec3 lightDir = normalize(vec3(-0.35, 0.75, 0.55));
            float hemi = n.y * 0.5 + 0.5;
            float lambert = max(dot(n, lightDir), 0.0);
            float fresnel = pow(1.0 - max(dot(n, viewDir), 0.0), 2.2);
            float vertical = smoothstep(-0.6, 1.95, vY);
            float sheen = smoothstep(0.48, 0.52, sin(vWorld.x * 3.0 + vWorld.y * 2.4 + time * 1.8) * 0.5 + 0.5);
            vec3 color = mix(bottomColor, topColor, vertical);
            color *= 0.78 + lambert * 0.34 + hemi * 0.14;
            color += rimColor * fresnel * 0.38;
            color += vec3(1.0, 0.95, 0.65) * sheen * 0.055;
            gl_FragColor = vec4(color, 1.0);
          }
        `,
      });
    }

    function resetPlayersPose() {
      const baseY = -1.2;
      [leftPlayer, rightPlayer].forEach((p) => {
        p.position.x = p.userData.baseX;
        p.position.y = baseY;
        p.userData.targetX = p.userData.baseX;
        delete p.userData.kb;
        delete p.userData.knock;
        delete p.userData.celebrate;
        delete p.userData.flightLife;
        delete p.userData.spin;
        p.rotation.set(0, 0, 0);
        p.visible = true;
      });
      followTarget = null;
      state.waitingReturn = false;
      // Ensure visuals are present after knockback/round transitions
      attachHeadgear(leftPlayer, state.headgear?.left || config.headgear.left || 0, -1);
      attachHeadgear(rightPlayer, state.headgear?.right || config.headgear.right || 0, 1);
      updateChargeOrbs(leftPlayer, state.charges.left);
      updateChargeOrbs(rightPlayer, state.charges.right);
    }

    function updateChargeOrbs(player, count) {
      const group = player.getObjectByName("chargeGroup");
      if (!group) return;
      while (group.children.length > count) {
        const orb = group.children.pop();
        if (orb) group.remove(orb);
      }
      while (group.children.length < count) {
        const orb = new THREE.Mesh(
          new THREE.SphereGeometry(0.2, 24, 24),
          new THREE.MeshToonMaterial({ color: 0x78ff78, emissive: 0x2fbf2f, gradientMap: null })
        );
        const idx = group.children.length;
        orb.position.set((idx - (count - 1) / 2) * 0.5, 0.6 + Math.sin(idx) * 0.05, 0);
        orb.add(makeBulletOutline(orb.geometry, true));
        group.add(orb);
      }
      for (let i = 0; i < group.children.length; i++) {
        const orb = group.children[i];
        if (orb && orb.isMesh) {
          orb.position.x = (i - (count - 1) / 2) * 0.5;
          orb.position.y = 1.5 + Math.sin(performance.now() * 0.002 + i) * 0.1;
        }
      }
    }

    function makeLabelTexture(text) {
      const size = 128;
      const fontSize = text.length > 2 ? 50 : 64;
      const canvasTag = document.createElement("canvas");
      canvasTag.width = canvasTag.height = size;
      const ctx = canvasTag.getContext("2d");
      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = "rgba(0,0,0,0.78)";
      ctx.font = `bold ${fontSize}px 'Noto Sans JP', sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, size / 2, size / 2);
      const texture = new THREE.CanvasTexture(canvasTag);
      texture.needsUpdate = true;
      return texture;
    }

    function makeLabelSprite(text) {
      const texture = makeLabelTexture(text);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
      const sprite = new THREE.Sprite(material);
      const scale = text.length > 2 ? 1.2 : 1.5;
      sprite.scale.set(scale, scale, 1);
      return sprite;
    }

    function refreshUI(hidden = true) {
      if (!state.headgear) state.headgear = { left: config.headgear.left || 0, right: config.headgear.right || 0 };
      scoreLeft.textContent = `左 ${state.scores.left}`;

    function updateLabels() {

    function loadConfig() {
      try {
        const raw = localStorage.getItem(configKey);
        if (!raw) {
          config.grassEnabled = shouldAutoEnableGrass();
          return;
        }
        const stored = JSON.parse(raw);
        if (stored.headgear) {
          if (typeof stored.headgear.left === "number") config.headgear.left = stored.headgear.left;
          if (typeof stored.headgear.right === "number") config.headgear.right = stored.headgear.right;
        }
        if (typeof stored.grassEnabled === "boolean") {
          config.grassEnabled = stored.grassEnabled;
        } else {
          config.grassEnabled = shouldAutoEnableGrass();
        }
      } catch (e) {
        console.warn("保存データの読み込みに失敗しました", e);
        config.grassEnabled = shouldAutoEnableGrass();
      }
    }

    function saveConfig() {
      localStorage.setItem(configKey, JSON.stringify(config));
    }

    function updateControlBadges() {
      const cpuMode = state.mode === "cpu";
      if (rightControlCard) rightControlCard.classList.toggle("is-cpu", cpuMode);
      if (rightControlTitle) rightControlTitle.textContent = cpuMode ? "CPU" : "2P";
      if (rightControlSub) rightControlSub.textContent = cpuMode ? "自動" : "キーボード";
      headLeftLabel.textContent = headgearNames[config.headgear.left] || "なし";
      headRightLabel.textContent = headgearNames[config.headgear.right] || "なし";
      updateGrassToggle();

    function updateGrassToggle() {
      if (!grassToggleButton) return;
      grassToggleButton.textContent = config.grassEnabled ? "ON" : "OFF";
      grassToggleButton.classList.toggle("active", config.grassEnabled);
      grassToggleButton.setAttribute("aria-pressed", config.grassEnabled ? "true" : "false");
      setGrassEnabled(config.grassEnabled);
    }

    function toggleGrass() {
      config.grassEnabled = !config.grassEnabled;
      saveConfig();
      updateGrassToggle();
    }

    function setHeadgear(side, dir) {
      const listLen = headgearNames.length;
      const current = config.headgear[side] || 0;
      const next = (current + dir + listLen) % listLen;
      config.headgear[side] = next;
      saveConfig();
      updateControlBadges();
      attachHeadgear(side === "left" ? leftPlayer : rightPlayer, next, side === "left" ? -1 : 1);
    }

    function registerChoice(side, action) {
      if (!state.roundOpen || state.winner || state.choices[side]) return false;
      if (action === "guard" && state.shieldLocked[side]) {
        statusEl.textContent = `${side === "left" ? "左" : "右"} シールド封印中`;
        // その場で失敗演出だけ出して入力を消費し、待ち時間を減らす
        flashLockedTint(side === "left" ? leftPlayer : rightPlayer);
        state.choices[side] = "none";
        state.history.push({
          round: state.history.length + 1,
          leftChoice: side === "left" ? "guard-locked" : null,
          rightChoice: side === "right" ? "guard-locked" : null,
          scores: { ...state.scores },
          call: "封印ガード",
          detail: "",
          time: Date.now(),
          
        });
        return true;
      }
      state.choices[side] = action;
      if (side === "left" && state.mode === "cpu" && !state.choices.right) {
        scheduleCpuChoice(true);
      }
      return true;
    }

    loadConfig();
    updateControlBadges();

    function startSequence() {
      if (state.sequenceRunning || state.winner || state.waitingReturn) return;
      if (!state.mode) return;
      // Re-attach visuals in case they were hidden/removed in the previous exchange
      attachHeadgear(leftPlayer, state.headgear?.left || config.headgear.left || 0, -1);
      attachHeadgear(rightPlayer, state.headgear?.right || config.headgear.right || 0, 1);
      updateChargeOrbs(leftPlayer, state.charges.left);
      updateChargeOrbs(rightPlayer, state.charges.right);
      state.sequenceRunning = true;
      state.choices = { left: null, right: null };
      state.roundOpen = false;
      refreshUI(true);
      camFocusTargetX = 0;
      camDistTarget = 9.6;
      statusEl.textContent = "";
      const hardMode = state.mode === "cpu" && state.cpuMode === "hard";
      const calls = hardMode ? ["C!", "C!", "レモン!"] : ["🍋", "🍋🍋", "🍋🍋🍋"];
      callEl.classList.add("flash");
      callEl.classList.add("call-pop");
      const bgSteps = hardMode ? [0xfff08a, 0xfff08a, 0xf5c000] : [0xf5c000, 0xf5d94c, 0xffe678];
      const step = (idx) => {
        if (idx >= calls.length) {
          callEl.classList.remove("flash");
          callEl.classList.remove("call-pop");
          state.sequenceRunning = false;
          if (!hardMode) startRound();
          return;
        }
        callEl.textContent = calls[idx];
        statusEl.textContent = "";
        backgroundScene.background = new THREE.Color(bgSteps[idx] || 0xf5c000);
        playClap();
        if (sounds.count) { sounds.count.currentTime = 0; sounds.count.play(); }
        if (hardMode && idx < 2) {
          spawnRhythmFlash();
          camDistTarget = 8.2;
          cameraKick(0.55, false);
        } else if (hardMode) {
          camDistTarget = 9.6;
          state.sequenceRunning = false;
          startRound(true);
          playDon();
          cameraKick(0.18, false);
          return;
        } else {
          cameraKick(0.35, false);
        }
        setTimeout(() => step(idx + 1), 500);
      };
      step(0);
    }

    function startRound(hardTiming = false) {
      state.roundOpen = true;
      statusEl.textContent = "";
      if (!hardTiming) {
        callEl.textContent = "入力";
        playDon();
      }
      callEl.classList.remove("call-pop");
      void callEl.offsetWidth;
      callEl.classList.add("call-pop");
      clearTimeout(state.timerId);
      state.timerId = setTimeout(resolveRound, hardTiming ? 520 : 1800);
      hideShields();
    }

    function resolveRound() {
      if (!state.roundOpen) return;
      state.roundOpen = false;
      clearTimeout(state.timerId);
      clearTimeout(cpuTimeout);
      clearTimeout(nextRoundTimeout);
      if (!state.choices.left) state.choices.left = "none";
      if (!state.choices.right) state.choices.right = "none";
      const prevScores = { ...state.scores };
      const hardMiss = state.mode === "cpu" && state.cpuMode === "hard" && state.choices.left === "none";
      const outcome = hardMiss ? makeHardMissOutcome() : judge(state.choices.left, state.choices.right);
      state.history.push({
        round: state.history.length + 1,
        leftChoice: state.choices.left,
        rightChoice: state.choices.right,
        scores: { ...state.scores },
        call: outcome.call,
        detail: outcome.detail,
        time: Date.now(),
      });
      applyHealthChanges(outcome);
      refreshUI(false);
      handleVisuals(outcome.visuals);
      callEl.textContent = outcome.call;
      statusEl.textContent = outcome.detail;
      applyShieldLimits(prevScores, outcome);
      checkWinner();
      if (!state.winner) {
        const hit = outcome.visuals.hitLeft || outcome.visuals.hitRight;
        if (hit) {
          scheduleResetAfterHit();
        } else {
          nextRoundTimeout = setTimeout(() => startSequence(), 900);
        }
      }
    }

    function makeHardMissOutcome() {
      const visuals = {
        left: null,
        right: "gun",
        chargeLeft: false,
        chargeRight: false,
        hitLeft: true,
        hitRight: false,
        burstLeft: false,
        burstRight: false,
        perfectShieldLeft: false,
        perfectShieldRight: false,
      };
      state.scores.right += 1;
      return {
        call: "出遅れ",
        detail: "ハード ペナルティ",
        visuals,
        whiffLeft: false,
        whiffRight: false,
        guardSuccessLeft: false,
        guardSuccessRight: false,
        perfectShieldLeft: false,
        perfectShieldRight: false,
      };
    }

    function judge(left, right) {
      const leftGunAttempt = left === "gun";
      const rightGunAttempt = right === "gun";
      const leftGunReady = leftGunAttempt && state.charges.left > 0;
      const rightGunReady = rightGunAttempt && state.charges.right > 0;

      if (left === "charge") {
        state.charges.left += 1;
        addBoostCharge("left");
        if (sounds.charge) { sounds.charge.currentTime = 0; sounds.charge.play(); }
      }
      if (right === "charge") {
        state.charges.right += 1;
        addBoostCharge("right");
        if (sounds.charge) { sounds.charge.currentTime = 0; sounds.charge.play(); }
      }
      if (left === "gun" && state.charges.left > 0) state.charges.left -= 1;
      if (right === "gun" && state.charges.right > 0) state.charges.right -= 1;

      let burstLeft = false;
      let burstRight = false;
      let perfectShieldLeft = false;
      let perfectShieldRight = false;
      if (state.boost.left.ready) {
        if (left === "gun" && leftGunReady) { burstLeft = true; consumeBoost("left"); }
        else if (left === "guard") { perfectShieldLeft = true; consumeBoost("left"); }
      }
      if (state.boost.right.ready) {
        if (right === "gun" && rightGunReady) { burstRight = true; consumeBoost("right"); }
        else if (right === "guard") { perfectShieldRight = true; consumeBoost("right"); }
      }

      const visuals = {
        left: leftGunReady ? "gun" : left === "guard" ? "shield" : null,
        right: rightGunReady ? "gun" : right === "guard" ? "shield" : null,
        chargeLeft: left === "charge",
        chargeRight: right === "charge",
        hitLeft: false,
        hitRight: false,
        burstLeft,
        burstRight,
        perfectShieldLeft,
        perfectShieldRight,
      };

      const guardSuccessLeft = (left === "guard" && rightGunReady) || perfectShieldLeft;
      const guardSuccessRight = (right === "guard" && leftGunReady) || perfectShieldRight;
      const whiffLeft = left === "guard" && !guardSuccessLeft;
      const whiffRight = right === "guard" && !guardSuccessRight;
      const extra = [];
      if (burstLeft) extra.push("左 レモンスコール");
      if (burstRight) extra.push("右 レモンスコール");
      if (perfectShieldLeft) extra.push("左 ビタミンシールド");
      if (perfectShieldRight) extra.push("右 ビタミンシールド");

      if (leftGunReady && rightGunReady && burstLeft && !burstRight) {
        state.scores.left += 1;
        visuals.hitRight = true;
        return { call: "左ヒット", detail: `${extra.join(" ")} 相殺突破`.trim(), visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
      }
      if (leftGunReady && rightGunReady && burstRight && !burstLeft) {
        state.scores.right += 1;
        visuals.hitLeft = true;
        return { call: "右ヒット", detail: `${extra.join(" ")} 相殺突破`.trim(), visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
      }
      if (leftGunReady && rightGunReady) {
        return { call: "相殺！", detail: extra.join(" "), visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
      }
      if (leftGunReady && !rightGunReady) {
        if (right === "guard") return { call: "防がれた", detail: extra.join(" "), visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
        state.scores.left += 1;
        visuals.hitRight = true;
        return { call: "左ヒット", detail: extra.join(" "), visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
      }
      if (rightGunReady && !leftGunReady) {
        if (left === "guard") return { call: "防いだ", detail: extra.join(" "), visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
        state.scores.right += 1;
        visuals.hitLeft = true;
        return { call: "右ヒット", detail: extra.join(" "), visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
      }
      if (leftGunAttempt && !leftGunReady) {
        return { call: "左 弾なし", detail: "チャージ不足", visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
      }
      if (rightGunAttempt && !rightGunReady) {
        return { call: "右 弾なし", detail: "チャージ不足", visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
      }
      if (left === "none" && right === "none") {
        return { call: "待機", detail: extra.join(" "), visuals, whiffLeft, whiffRight, guardSuccessLeft, guardSuccessRight, perfectShieldLeft, perfectShieldRight };
      }
      const nonHit = describeNonHitOutcome(left, right, whiffLeft, whiffRight);
      return {
        call: nonHit.call,
        detail: [nonHit.detail, extra.join(" ")].filter(Boolean).join(" "),
        visuals,
        whiffLeft,
        whiffRight,
        guardSuccessLeft,
        guardSuccessRight,
        perfectShieldLeft,
        perfectShieldRight,
      };
    }

    function describeNonHitOutcome(left, right, whiffLeft, whiffRight) {
      const leftCharge = left === "charge";
      const rightCharge = right === "charge";
      if (leftCharge && rightCharge) return { call: "チャージ", detail: "両者 レモン補充" };
      if (leftCharge) return { call: "左チャージ", detail: "左 レモン補充" };
      if (rightCharge) return { call: "右チャージ", detail: "右 レモン補充" };
      if (whiffLeft && whiffRight) return { call: "ガード空振り", detail: "両者 守り失敗" };
      if (whiffLeft) return { call: "左ガード空振り", detail: "左 守り失敗" };
      if (whiffRight) return { call: "右ガード空振り", detail: "右 守り失敗" };
      return { call: "待機", detail: "" };
    }

    function applyShieldLimits(prevScores, outcome) {
      if (!outcome) return;
      const messages = [];
      const bump = (side, whiffed) => {
        if (state.scores[side] > prevScores[side]) {
          state.shieldWhiffs[side] = 0;
          state.shieldLocked[side] = false;
        }
        if (whiffed) {
          state.shieldWhiffs[side] = (state.shieldWhiffs[side] || 0) + 1;
          if (state.shieldWhiffs[side] >= SHIELD_MAX_WHIFTS && !state.shieldLocked[side]) {
            state.shieldLocked[side] = true;
            messages.push(`${side === "left" ? "左" : "右"} シールド封印`);
          }
        }
      };
      bump("left", !!outcome.whiffLeft);
      bump("right", !!outcome.whiffRight);
      if (messages.length) {
        const tail = messages.join(" / ");
        statusEl.textContent = statusEl.textContent ? `${statusEl.textContent} | ${tail}` : tail;
      }
      updateShieldMeters();
      if (state.scores.left > prevScores.left) flashScore("left");
      if (state.scores.right > prevScores.right) flashScore("right");
    }

    function applyHealthChanges(outcome) {
      if (!outcome) return;
      if (outcome.visuals.hitLeft) adjustHealth("left", -HEALTH_HIT);
      if (outcome.visuals.hitRight) adjustHealth("right", -HEALTH_HIT);
      if (outcome.guardSuccessLeft) {
        adjustHealth("left", HEALTH_GUARD_HEAL + (outcome.perfectShieldLeft ? 0.05 : 0));
      }
      if (outcome.guardSuccessRight) {
        adjustHealth("right", HEALTH_GUARD_HEAL + (outcome.perfectShieldRight ? 0.05 : 0));
      }
    }

    function getVictoryDisplay(winner) {
      if (state.mode === "cpu") {
        return winner === "左"
          ? { call: "勝ち！", result: "勝ち！", tone: "win" }
          : { call: "負け！", result: "負け！", tone: "out" };
      }
      const playerLabel = winner === "左" ? "1P" : "2P";
      return { call: `${playerLabel} 勝利！`, result: `${playerLabel} 勝利！`, tone: "win" };
    }

    function checkWinner() {
      const leftDead = state.health.left <= 0;
      const rightDead = state.health.right <= 0;
      if (leftDead || rightDead || state.scores.left >= 3 || state.scores.right >= 3) {
        if (leftDead && !rightDead) state.winner = "右";
        else if (rightDead && !leftDead) state.winner = "左";
        else state.winner = state.scores.left > state.scores.right ? "左" : "右";
        state.pendingCelebrate = state.winner === "左" ? leftPlayer : rightPlayer;
        state.finalHitPending = true;
        state.celebrationDelay = 0;
        if (sounds.win) { sounds.win.currentTime = 0; sounds.win.play(); }
      }
    }

    function handleKey(e) {
      const key = e.key;
      const code = e.code;
      if (key.toLowerCase() === "r") {
        resetGame(true);
        return;
      }
      if (!state.roundOpen || state.winner) return;
      const action = mapping.left[key] || mapping.left[key.toLowerCase()] || mapping.left[code];
      if (action && registerChoice("left", action) && state.mode === "cpu" && !state.choices.right) {
        scheduleCpuChoice(true);
      }
      if (state.mode !== "cpu") {
        const actionR = mapping.right[key] || mapping.right[key.toLowerCase()] || mapping.right[code];
        if (actionR) registerChoice("right", actionR);
      }
      if (state.choices.left && state.choices.right) resolveRound();
    }

    function resetGame(showStart = false) {
      state.scores = { left: 0, right: 0 };
      state.charges = { left: 0, right: 0 };
      state.choices = { left: null, right: null };
      state.shieldWhiffs = { left: 0, right: 0 };
      state.shieldLocked = { left: false, right: false };
      state.health = { left: 1, right: 1 };
      state.boost = {
        left: { gauge: 0, ready: false },
        right: { gauge: 0, ready: false },
      };
      state.headgear = { left: config.headgear?.left || 0, right: config.headgear?.right || 0 };
      state.waitingReturn = false;
      state.roundOpen = false;
      state.sequenceRunning = false;
      state.winner = null;
      state.pendingCelebrate = null;
      state.celebrationDelay = 0;
      state.finalHitPending = false;
      state.history = [];
      timeScale = 1;
      clearTimeout(state.timerId);
      clearTimeout(cpuTimeout);
      clearTimeout(nextRoundTimeout);
      callEl.textContent = "";
      statusEl.textContent = "3 → 2 → 1 → 3秒入力";
      resetPlayersPose();
      // Ensure any leftover headgear meshes are cleared/reapplied to match current config.
      attachHeadgear(leftPlayer, state.headgear.left, -1);
      attachHeadgear(rightPlayer, state.headgear.right, 1);
      refreshUI(true);
      hideShields();
      if (showStart) {
        state.mode = null;
        camFocusTargetX = 0;
        camDistTarget = 9.6;
        startScreen.style.display = "flex";
      }
    }

    function handleVisuals(visuals) {
      worldUniforms.pulse.value = Math.max(worldUniforms.pulse.value, 0.7);
      hideShields();
      if (visuals.left === "gun") {
        const shots = visuals.burstLeft ? 3 : 1;
        for (let i = 0; i < shots; i++) {
          const burstBreaksClash = visuals.burstLeft && visuals.right === "gun" && !visuals.burstRight;
          const willHit = visuals.hitRight && (burstBreaksClash ? i === 1 : i === 0);
          setTimeout(() => spawnBullet(true, willHit, visuals.burstLeft), i * 90);
        }
        if (sounds.shot) { sounds.shot.currentTime = 0; sounds.shot.play(); }
        focusOn((leftPlayer.position.x + rightPlayer.position.x) * 0.5, 0.5, 8.8);
      }
      if (visuals.right === "gun") {
        const shots = visuals.burstRight ? 3 : 1;
        for (let i = 0; i < shots; i++) {
          const burstBreaksClash = visuals.burstRight && visuals.left === "gun" && !visuals.burstLeft;
          const willHit = visuals.hitLeft && (burstBreaksClash ? i === 1 : i === 0);
          setTimeout(() => spawnBullet(false, willHit, visuals.burstRight), i * 90);
        }
        if (sounds.shot) { sounds.shot.currentTime = 0; sounds.shot.play(); }
        focusOn((leftPlayer.position.x + rightPlayer.position.x) * 0.5, 0.5, 8.8);
      }
      if (visuals.left === "shield") {
        showShield(leftPlayer, true, visuals.perfectShieldLeft, state.shieldLocked.left);
        if (visuals.perfectShieldLeft && !state.shieldLocked.left) applyMembrane(leftPlayer, 2200);
        if (!state.shieldLocked.left && visuals.perfectShieldLeft) spawnLightningParry(leftPlayer); else if (!state.shieldLocked.left) spawnIceBarrier(leftPlayer);
        focusOn(leftPlayer.position.x, 0.4, 9.0);
      }
      if (visuals.right === "shield") {
        showShield(rightPlayer, false, visuals.perfectShieldRight, state.shieldLocked.right);
        if (visuals.perfectShieldRight && !state.shieldLocked.right) applyMembrane(rightPlayer, 2200);
        if (!state.shieldLocked.right && visuals.perfectShieldRight) spawnLightningParry(rightPlayer); else if (!state.shieldLocked.right) spawnIceBarrier(rightPlayer);
        focusOn(rightPlayer.position.x, 0.4, 9.0);
      }
     if (visuals.chargeLeft) { spawnChargeRain(leftPlayer); spawnChargeGlow(leftPlayer); }
     if (visuals.chargeRight) { spawnChargeRain(rightPlayer); spawnChargeGlow(rightPlayer); }
      if (visuals.hitLeft) {
        if (state.shieldLocked.left) flashLockedTint(leftPlayer); // flash angry red when locked and hit
        addStain(leftPlayer);
        spawnStars(leftPlayer.position.clone().add(new THREE.Vector3(0, 1.4, 0)), 5);
        spawnKnockoutBurst(leftPlayer, -1, state.health.left <= 0);
        focusOn(leftPlayer.position.x, 0.8, 12.0);
        if (sounds.hit) { sounds.hit.currentTime = 0; sounds.hit.play(); }
      }
      if (visuals.hitRight) {
        if (state.shieldLocked.right) flashLockedTint(rightPlayer);
        addStain(rightPlayer);
        spawnStars(rightPlayer.position.clone().add(new THREE.Vector3(0, 1.4, 0)), 5);
        spawnKnockoutBurst(rightPlayer, 1, state.health.right <= 0);
        focusOn(rightPlayer.position.x, 0.8, 12.0);
        if (sounds.hit) { sounds.hit.currentTime = 0; sounds.hit.play(); }
      }
      movePlayers(visuals);
    }

    function scheduleResetAfterHit() {
      clearTimeout(nextRoundTimeout);
      camDistTarget = 12.5;
      camFocusTargetX = 0;
      callEl.classList.remove("call-pop");
      void callEl.offsetWidth;
      callEl.classList.add("call-pop");
      nextRoundTimeout = setTimeout(() => {
        resetPlayersPose();
        camFocusTargetX = 0;
        camDistTarget = 9.6;
        callEl.textContent = "NEXT";
        callEl.classList.remove("call-pop");
        void callEl.offsetWidth;
        callEl.classList.add("call-pop");
        setTimeout(() => startSequence(), 500);
      }, 1800);
    }

    function scheduleCpuChoice(immediate = true) {
      clearTimeout(cpuTimeout);
      const delay = immediate ? 0 : 0;
      cpuTimeout = setTimeout(() => {
        if (!state.roundOpen || state.winner) return;
        const hasCharge = state.charges.right > 0;
        const oppHasCharge = state.charges.left > 0;
      const lastOppCharge = state.choices.left === "charge";
      const opponentIdleShots = state.charges.left === 0;
        let choice = "charge";
        if (state.cpuMode === "smart") {
          const weights = { charge: 0.4, gun: 0.4, guard: 0.2 };
          if (!oppHasCharge) weights.guard = 0.05;
          if (lastOppCharge) weights.guard += 0.2;
          if (state.choices.left === "gun") weights.guard += 0.25;
          if (opponentIdleShots) weights.gun += 0.15;
          if (hasCharge) weights.gun += 0.2;
          const roll = Math.random();
          const sum = weights.charge + weights.gun + weights.guard;
          let acc = 0;
          const pick = (key) => { choice = key; };
          acc += weights.charge / sum; if (roll <= acc) pick("charge");
          else if (roll <= acc + weights.gun / sum) pick("gun");
          else pick("guard");
        } else if (state.cpuMode === "ultra") {
          // weighted strategy based on imported weights
          const w = config.cpuWeights || { charge: 0.33, gun: 0.33, guard: 0.34 };
          const sum = w.charge + w.gun + w.guard || 1;
          const roll = Math.random();
          let acc = 0;
          acc += w.charge / sum;
          if (roll <= acc) choice = "charge";
          else if (roll <= acc + w.gun / sum) choice = "gun";
          else choice = "guard";
          if (choice === "guard" && state.shieldLocked.right) choice = hasCharge ? "gun" : "charge";
        } else {
          if (Math.random() < 0.2) choice = "guard";
          if (hasCharge && Math.random() < 0.7) choice = "gun";
        }
        if (choice === "guard" && state.shieldLocked.right) choice = "charge";
        registerChoice("right", choice);
        if (state.choices.left && state.choices.right) resolveRound();
      }, delay);
    }

    function flashLockedTint(player, duration = 400) {
      const tint = new THREE.Color(0xff0000);
      // Avoid reapplying while active
      if (player.userData.lockTintActive) { spawnLockX(player); return; }
      player.userData.lockTintActive = true;
      spawnLockX(player);
      player.traverse((child) => {
        if (!child.isMesh || !child.material) return;
        const mat = child.material;
        const supported = mat.isMeshStandardMaterial || mat.isMeshPhongMaterial || mat.isMeshToonMaterial || mat.isMeshLambertMaterial;
        if (!supported) return;
        if (!mat.emissive) mat.emissive = new THREE.Color(0x000000);
        if (!child.material.userData.__origEmissive) {
          mat.userData.__origEmissive = mat.emissive.clone();
          mat.userData.__origIntensity = mat.emissiveIntensity || 0;
        }
        mat.emissive.copy(tint);
        mat.emissiveIntensity = 2.5;
      });
      setTimeout(() => {
        player.traverse((child) => {
          if (!child.isMesh || !child.material) return;
          const mat = child.material;
          const supported = mat.isMeshStandardMaterial || mat.isMeshPhongMaterial || mat.isMeshToonMaterial || mat.isMeshLambertMaterial;
          if (!supported) return;
          const data = mat.userData;
          if (data?.__origEmissive) {
            mat.emissive.copy(data.__origEmissive);
            mat.emissiveIntensity = data.__origIntensity || 0;
          }
        });
        player.userData.lockTintActive = false;
      }, duration);
    }

    function spawnLockX(player) {
      const layer = document.getElementById("lock-x-layer");
      if (!layer) return;
      const head = player.getObjectByName("headAnchor");
      const pos = head ? head.getWorldPosition(new THREE.Vector3()) : player.position.clone();
      pos.y += 0.9;
      const screen = worldToScreen(pos);
      const el = document.createElement("div");
      el.className = "red-x";
      el.textContent = "✕";
      el.style.left = `${screen.x}px`;
      el.style.top = `${screen.y}px`;
      layer.appendChild(el);
      setTimeout(() => el.remove(), 500);
    }

    function showShield(player, isLeft, perfect = false, locked = false) {
      const shield = player.getObjectByName("shield");
      if (!shield) return;
      const shieldOutline = player.getObjectByName("shieldOutline");
      shield.visible = true;
      if (shieldOutline) shieldOutline.visible = true;
      if (locked) {
        flashLockedTint(player);
      } else {
        applyMembrane(player, perfect ? 2200 : 1500);
      }
      setTimeout(() => {
        shield.visible = false;
        if (shieldOutline) shieldOutline.visible = false;
      }, 1500);
      if (isLeft) player.rotation.y = 0.12;
      else player.rotation.y = -0.12;
      setTimeout(() => { player.rotation.y = 0; }, 400);
      spawnGuardWave(player);
    }

    function hideShields() {
      [leftPlayer, rightPlayer].forEach((player) => {
        const shield = player.getObjectByName("shield");
        const shieldOutline = player.getObjectByName("shieldOutline");
        if (shield) shield.visible = false;
        if (shieldOutline) shieldOutline.visible = false;
      });
    }

      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.6, 0.9, 24),

    function movePlayers(visuals) {
      leftPlayer.userData.targetX = leftPlayer.userData.baseX;
      rightPlayer.userData.targetX = rightPlayer.userData.baseX;
      if (visuals.left === "gun") leftPlayer.userData.targetX += 0.4;
      if (visuals.right === "gun") rightPlayer.userData.targetX -= 0.4;
      if (visuals.left === "shield") leftPlayer.userData.targetX -= 0.25;
      if (visuals.right === "shield") rightPlayer.userData.targetX += 0.25;
    }

    function knockOffHeadgear(player, side, hatId) {
      if (!player) return;
      const anchor = player.getObjectByName("headAnchor");
      if (!anchor || anchor.children.length === 0) return;
      const hat = anchor.children.pop();
      anchor.remove(hat);
      const worldPos = new THREE.Vector3();
      anchor.getWorldPosition(worldPos);
      hat.position.copy(worldPos);
      spawnStars(worldPos, 4);
      const dir = player.userData.lastHitDir ?? (side === "left" ? -1 : 1);
      hat.userData.spin = new THREE.Vector3(
        (Math.random() - 0.5) * 8 * HEADGEAR_KNOCK_SPEED,
        (4 + Math.random() * 4) * HEADGEAR_KNOCK_SPEED,
        (Math.random() - 0.5) * 8 * HEADGEAR_KNOCK_SPEED
      );
      hat.userData.vel = new THREE.Vector3(
        dir * (0.8 + Math.random() * 0.6) * 10,
        (9.5 + Math.random() * 3.5) * 10,
        (Math.random() - 0.5) * 0.8 * 10
      );
      hat.userData.gravity = 20;
      hat.userData.life = 0.6;
      hat.userData.returning = true; // immediately mark for removal on update
      hat.userData.anchor = anchor;
      hat.userData.startRot = hat.rotation.clone();
      hat.userData.hatId = hatId || hat.userData.hatId;
      knockedHats.push(hat);
      scene.add(hat);
      if (hat.userData.hatId === 1) spawnLemonSplash(hat.position);
      if (hat.userData.hatId === 3) spawnHeadphoneRipple(hat.position);
      if (hat.userData.hatId === 2) spawnCrownSparkle(hat.position);
    }

    function easeInOutQuad(t) {
      return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    let hexGeom = null;
    function spawnHoneycombBurst(player) {
      const base = player.position.clone().add(new THREE.Vector3(0, 1.2, 0.4));
      if (!hexGeom) {
        const shape = new THREE.Shape();
        const r = 0.18;
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI / 3) * i + Math.PI / 6;
          const x = Math.cos(a) * r, y = Math.sin(a) * r;
          if (i === 0) shape.moveTo(x, y); else shape.lineTo(x, y);
        }
        shape.closePath();
        hexGeom = new THREE.ShapeGeometry(shape);
      }
      const count = 10;
      for (let i = 0; i < count; i++) {
        const mesh = new THREE.Mesh(
          hexGeom,
          new THREE.MeshBasicMaterial({ color: 0x35e0ff, transparent: true, opacity: 0.9, side: THREE.DoubleSide, depthWrite: false })
        );
        mesh.position.copy(base).add(new THREE.Vector3(
          (Math.random() - 0.5) * 1.2,
          (Math.random() - 0.5) * 0.6,
          (Math.random() - 0.5) * 0.6
        ));
        mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        mesh.userData = {
          vel: new THREE.Vector3((Math.random() - 0.5) * 3, (Math.random() - 0.2) * 2, (Math.random() - 0.5) * 2),
          life: 0.4,
          start: 0.4,
          spin: new THREE.Vector3(Math.random() * 4, Math.random() * 4, Math.random() * 4),
        };
        scene.add(mesh);
        honeycombs.push(mesh);
      }
    }

    function spawnDamageTrail(player, dir, side) {
      const trailSide = side || (player === leftPlayer ? "left" : "right");
      const existing = damageTrails.find((t) => t.userData.side === trailSide);
      const start = existing?.userData.startPos || player.position.clone().add(new THREE.Vector3(0, 1.2, 0.1));
      const end = player.position.clone().add(new THREE.Vector3(0, 1.2, 0.1)).add(new THREE.Vector3(dir * -2.6, 0, 0));
      const mid = start.clone().lerp(end, 0.5);
      const length = start.distanceTo(end);
      const dirVec = end.clone().sub(start).normalize();

      let trail = existing;
      if (!trail) {
        const geom = new THREE.BoxGeometry(length, 0.16, 0.04);
        const mat = new THREE.MeshBasicMaterial({ color: 0xff3030, transparent: true, opacity: 0.9, depthWrite: false });
        trail = new THREE.Mesh(geom, mat);
        trail.userData = { side: trailSide, startPos: start.clone(), life: 0.2, start: 0.2 };
        scene.add(trail);
        damageTrails.push(trail);
      } else {
        if (trail.geometry) trail.geometry.dispose();
        trail.geometry = new THREE.BoxGeometry(length, 0.16, 0.04);
        trail.userData.startPos = start.clone();
        trail.userData.life = trail.userData.start = 0.2;
      }
      trail.position.copy(mid);
      trail.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), dirVec);
    }

    let starGeom = null;
    function spawnStars(worldPos, count = 3 + Math.floor(Math.random() * 3)) {
      if (!starGeom) {
        const shape = new THREE.Shape();
        const spikes = 5;
        const outer = 0.16;
        const inner = 0.07;
        for (let i = 0; i < spikes * 2; i++) {
          const r = i % 2 === 0 ? outer : inner;
          const a = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
          if (i === 0) shape.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else shape.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        shape.closePath();
        starGeom = new THREE.ShapeGeometry(shape);
      }
      for (let i = 0; i < count; i++) {
        const star = new THREE.Mesh(
          starGeom,
          new THREE.MeshBasicMaterial({ color: 0xffe566, transparent: true, opacity: 1, side: THREE.DoubleSide, depthWrite: false })
        );
        star.position.copy(worldPos).add(new THREE.Vector3(
          (Math.random() - 0.5) * 0.4,
          Math.random() * 0.2,
          (Math.random() - 0.5) * 0.4
        ));
        star.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        star.userData = {

    function worldToScreen(vec3) {
      const pos = vec3.clone().project(camera);
      return {
        x: (pos.x + 1) / 2 * window.innerWidth,

    function ensureShieldMeterGroup(player) {
      let group = player.getObjectByName("shieldMeterGroup");
      if (!group) {
        group = new THREE.Group();
        group.name = "shieldMeterGroup";
        player.add(group);
      }
      return group;
    }

    function rebuildShieldMeter(group, pct, locked) {
      while (group.children.length) {
        const c = group.children.pop();
        if (c.geometry) c.geometry.dispose();
        group.remove(c);
      }
      const arc = locked ? Math.PI * 2 : Math.max(0.001, pct * Math.PI * 2);
      const ringMat = new THREE.MeshToonMaterial({
        color: locked ? 0x52c7ff : 0x23f3ff,
        emissive: locked ? new THREE.Color(0x1f6fa0) : new THREE.Color(0x0ad8ff),
        emissiveIntensity: 0.9,
        transparent: true,
        opacity: locked ? 0.7 : 0.95,
        side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(new THREE.RingGeometry(0.35, 0.52, 64, 1, -Math.PI / 2, arc), ringMat);
      ring.name = "shieldMeterRing";
      const outline = makeOutline(ring, 1.06, "head"); // use headgear-style outline for readability
      group.add(ring);
      group.add(outline);
    }

    function updateShieldMeters() {
      const max = SHIELD_MAX_WHIFTS;
      const update = (player, side) => {
        if (!player) return;
        const group = ensureShieldMeterGroup(player);
        const locked = !!state.shieldLocked[side];
        const whiffs = state.shieldWhiffs[side] || 0;
        if (!locked && whiffs <= 0) {
          group.visible = false;
          return;
        }
        const remaining = locked ? 0 : Math.max(0, max - whiffs);
        const pct = max ? remaining / max : 0;
        rebuildShieldMeter(group, pct, locked);
        const dir = side === "left" ? -1 : 1;
        // Local offset so we don't double-apply world transforms
        group.position.set(dir * 2, 3.5, 0);
        group.lookAt(camera.position.x, player.position.y + group.position.y, camera.position.z);
        group.visible = player.visible;
      };
      update(leftPlayer, "left");
      update(rightPlayer, "right");
    }

    function updateHealthUI() {
      const update = (juiceEl, value) => {
        if (!juiceEl) return;
        const clamped = Math.max(0, Math.min(1, value));
        juiceEl.style.setProperty("--juice", clamped);
        juiceEl.style.height = `${clamped * 100}%`;
        juiceEl.classList.toggle("low", clamped <= 0.35);

      update(juiceLeft, state.health.left);
      update(juiceRight, state.health.right);
